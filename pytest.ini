[pytest]

pythonpath = .
python_files = test_*.py
python_functions = test_*
testpaths = tests
addopts =
    --html=reports/report.html
    --self-contained-html

markers =
    functional: Test cases that validate happy paths and core business logic.
    negative: Test cases that verify error handling, invalid data, and exceptions.
    acceptance: Minimum acceptance criteria required by the business stakeholders.
    smoke: Critical tests executed to verify the basic health of the API endpoints.
    regression: Comprehensive test suite executed to ensure code changes do not introduce new bugs.
