name: Continuous Testing (CT) Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        run_id: [1, 2, 3, 4, 5]
    
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      USERNAME: ${{ secrets.USERNAME }}
      REPO_NAME: ${{ secrets.REPO_NAME }}
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Linter
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Execute Pytest with Coverage
      run: |
        mkdir -p reports
        python -m pytest -v \
          --html=reports/report_${{ matrix.run_id }}.html \
          --self-contained-html \
          --junitxml=reports/junit_${{ matrix.run_id }}.xml \
          --cov=services/ \
          --cov=utils/ \
          --cov-report=html:reports/coverage_${{ matrix.run_id }}

    - name: Upload Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-ct-reports-run-${{ matrix.run_id }}
        path: reports/
        retention-days: 30
