name: CI/CT Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    name: Linter (flake8)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pep8-naming
    - name: Run Flake8
      run: flake8 . --count --statistics

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      USERNAME: ${{ secrets.USERNAME }}
      REPO_NAME: ${{ secrets.REPO_NAME }}
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest-cov pytest-html
    - name: Run Tests
      run: |
        mkdir -p reports
        python -m pytest tests/unit/ -v \
          --html=reports/report.html \
          --self-contained-html \
          --junitxml=reports/junit.xml \
          --cov=services/ \
          --cov=utils/ \
          --cov-report=html:reports/coverage \
          --cov-report=xml:reports/coverage.xml
    - name: Upload Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-ct-reports-run-${{ github.run_number }}
        path: reports/
        retention-days: 30