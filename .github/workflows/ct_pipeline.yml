name: Continuous Testing (CT) Pipeline

on:
  push:
    branches: [ main, feature/add-issue-tests ]
  pull_request:
    branches: [ main, feature/add-issue-tests ]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      GITHUB_USERNAME: ${{ secrets.GITHUB_USERNAME }}
      GITHUB_REPO: ${{ secrets.GITHUB_REPO }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest requests jsonschema python-dotenv rich pytest-html

    - name: Execute Pytest
      run: |
        mkdir -p reports
        for i in {1..5}
        do
          python -m pytest -v \
            --html=reports/report_run_$i.html --self-contained-html \
            --junitxml=reports/junit_run_$i.xml || true
        done

    - name: Upload Reports
      uses: actions/upload-artifact@v4
      with:
        name: pytest-ct-reports
        path: reports/
        retention-days: 5