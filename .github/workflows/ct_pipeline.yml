name: CI/CT Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    name: Linter (flake8)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pep8-naming
    - name: Run Flake8
      run: flake8 . --count --statistics

  unit-tests:
    name: Unit Tests (5 Runs)
    runs-on: ubuntu-latest
    needs: lint
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      USERNAME: ${{ secrets.USERNAME }}
      REPO_NAME: ${{ secrets.REPO_NAME }}
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest-cov pytest-html
    - name: Run Tests 5 times
      run: |
        mkdir -p reports
        for i in {1..5}; do
          python -m pytest tests/unit/ -v \
            --html=reports/report_$i.html \
            --junitxml=reports/junit_$i.xml \
            --cov=services/ \
            --cov=utils/ \
            --cov-report=html:reports/coverage_$i
        done
    - name: Upload Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-reports-all
        path: reports/
