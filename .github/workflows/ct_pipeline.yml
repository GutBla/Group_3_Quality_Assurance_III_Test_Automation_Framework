name: Continuous Testing (CT) Pipeline

on:
  push:
    branches: [ main, feature/ci-pipeline ]
  pull_request:
    branches: [ main, feature/ci-pipeline ]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      GITHUB_USERNAME: ${{ secrets.GITHUB_USERNAME }}
      GITHUB_REPO: ${{ secrets.GITHUB_REPO }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest requests jsonschema python-dotenv rich pytest-html

    - name: Verify Environment Variables
      run: |
        python -c "import os; print(f'BASE_URL set: {bool(os.getenv(\"BASE_URL\"))}')"
        python -c "import os; print(f'USERNAME set: {bool(os.getenv(\"GITHUB_USERNAME\"))}')"
        python -c "import os; print(f'REPO set: {bool(os.getenv(\"GITHUB_REPO\"))}')"
        python -c "import os; print(f'TOKEN set: {bool(os.getenv(\"GITHUB_TOKEN\"))}')"

    - name: Execute Pytest
      run: |
        mkdir -p reports
        python -m pytest -v --html=reports/report.html --junitxml=reports/junit.xml

    - name: Upload Reports
      uses: actions/upload-artifact@v4
      with:
        name: pytest-ct-reports
        path: reports/
        retention-days: 5